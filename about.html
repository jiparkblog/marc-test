<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="Favicon.png">
    <link rel="apple-touch-icon" href="Favicon.png">
    <title>About</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Selecta', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            overflow: hidden;
            background-color: #FFFFFF;
            transition: background-color 0.3s ease;
        }
        #bouncer {
            position: fixed;
            top: 0;
            left: 0;
            width: 200px;
            line-height: 120%;
            white-space: normal;
            word-wrap: break-word;
            text-align: center;
            pointer-events: none;
            transition: color 0.3s ease;
            will-change: transform;
            backface-visibility: hidden;
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="relative flex flex-col md:grid md:grid-flow-col md:auto-cols-auto p-6 gap-8">
        <div class="flex justify-between items-baseline md:contents">
            <div class="flex flex-col gap-0 leading-tight">
                <span><a href="index.html" class="text-[#808080]">Marc Hill</a></span>
            </div>
            <div class="flex gap-4 md:order-last md:justify-end text-[#808080]">
                <span>About</span>
                <span id="workBtn" class="cursor-pointer">Work</span>
            </div>
        </div>
    </div>

    <!-- Work Popup -->
    <div id="workPopup" class="fixed top-0 right-0 w-[310px] bg-white text-black p-8 hidden flex flex-col gap-2 z-50">
        <div class="flex justify-end">
            <span id="workClose" class="cursor-pointer">Close</span>
        </div>
        <div id="workText" class="leading-tight border-b border-[#E3E3E3] pb-[60px]"></div>
         <div class="flex flex-col gap-8">
            <span class="pt-[14px]">Clients</span>
            <div class="marquee-frame">
                <div class="marquee flex gap-8">
                    <img src="logo_1.svg" alt="logo" class="h-4">
                    <img src="logo_2.svg" alt="logo" class="h-4">
                    <img src="logo_3.svg" alt="logo" class="h-4">
                    <img src="logo_4.svg" alt="logo" class="h-4">
                    <img src="logo_5.svg" alt="logo" class="h-4">
                    <img src="logo_6.svg" alt="logo" class="h-4">
                    <img src="logo_7.svg" alt="logo" class="h-4">
                    <img src="logo_8.svg" alt="logo" class="h-4">
                </div>
            </div>
        </div>
    </div>

    <div id="bouncer"></div>

  
    <!-- Game elements -->
    <div id="ball" class="fixed pointer-events-none hidden" style="width:6px;height:6px;background:#00D4DF;"></div>
    <div id="paddle" class="fixed bottom-8 pointer-events-none hidden" style="width:80px;height:3px;background:white;opacity:0.5;"></div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQIXomht2WJYoDI6jozjeGsoIROOUdRDZ1drTClymzLfb-S9WUReyObnVMTL9jNNU2xru7qY_vDoDUF/pub?output=csv';
        const COLORS = ['#FFFFFF','#82D1FF','#BEFF82','#FFC2C2','#CE93FF','#FFC471','#5FFFBA'];

        let sentences = [];
        let sentenceIndex = 0;
        let colorIndex = 0;

        // DVD bounce state
        const bouncer = document.getElementById('bouncer');
        let x = 100, y = 200;
        let dx = 0.9, dy = 0.9;
        let animId;

        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const headers = lines[0].split(',').map(h => h.trim());
            const rows = [];
            for (let i = 1; i < lines.length; i++) {
                const values = [];
                let current = '';
                let inQuotes = false;
                for (let char of lines[i]) {
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        values.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                values.push(current.trim());
                const row = {};
                headers.forEach((h, idx) => row[h] = values[idx] || '');
                rows.push(row);
            }
            return { headers, rows };
        }

        function getTextColor(bgHex) {
            const r = parseInt(bgHex.slice(1,3), 16);
            const g = parseInt(bgHex.slice(3,5), 16);
            const b = parseInt(bgHex.slice(5,7), 16);
            const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
            return lum > 0.5 ? '#000000' : '#FFFFFF';
        }

        function setSentence() {
            if (sentences.length === 0) return;
            bouncer.textContent = sentences[sentenceIndex % sentences.length];
        }

        function setBouncerPosition(nextX, nextY) {
            bouncer.style.transform = `translate3d(${nextX}px, ${nextY}px, 0)`;
        }

        function bounce() {
            const color = COLORS[colorIndex % COLORS.length];
            document.body.style.backgroundColor = color;
            bouncer.style.color = getTextColor(color);

            // Update nav text color too
            document.querySelectorAll('.nav-text').forEach(el => {
                el.style.color = getTextColor(color);
            });

            colorIndex++;
            sentenceIndex++;
            setSentence();
        }

        function animate() {
            const rect = bouncer.getBoundingClientRect();
            const w = rect.width;
            const h = rect.height;
            const maxX = window.innerWidth - w;
            const maxY = window.innerHeight - h;

            x += dx;
            y += dy;

            let bounced = false;

            if (x <= 0) { x = 0; dx = -dx; bounced = true; }
            if (x >= maxX) { x = maxX; dx = -dx; bounced = true; }
            if (y <= 0) { y = 0; dy = -dy; bounced = true; }
            if (y >= maxY) { y = maxY; dy = -dy; bounced = true; }

            if (bounced) bounce();

            setBouncerPosition(x, y);

            animId = requestAnimationFrame(animate);
        }

        async function loadSheet() {
            const CACHE_KEY = 'sheetCache';
            const cached = localStorage.getItem(CACHE_KEY);

            function renderWorkText(rows) {
                const workTextRow = rows.find(r => r.Work_text);
                if (workTextRow) {
                    document.getElementById('workText').textContent = workTextRow.Work_text;
                }
            }

            if (cached) {
                const { rows } = JSON.parse(cached);
                sentences = rows.filter(r => r.Sentences).map(r => r.Sentences);
                renderWorkText(rows);
            }

            try {
                const res = await fetch(SHEET_URL);
                const text = await res.text();
                const { rows } = parseCSV(text);
                localStorage.setItem(CACHE_KEY, JSON.stringify({ rows }));
                sentences = rows.filter(r => r.Sentences).map(r => r.Sentences);
                renderWorkText(rows);
            } catch (err) {
                console.error('Failed to load sheet:', err);
            }

            if (sentences.length > 0) {
                // Set initial state
                const color = COLORS[0];
                document.body.style.backgroundColor = color;
                bouncer.style.color = getTextColor(color);
                colorIndex = 1;
                setSentence();

                // Randomize starting position
                setBouncerPosition(0, 0);
                bouncer.style.visibility = 'hidden';

                requestAnimationFrame(() => {
                    const rect = bouncer.getBoundingClientRect();
                    x = Math.random() * (window.innerWidth - rect.width);
                    y = Math.random() * (window.innerHeight - rect.height);
                    setBouncerPosition(x, y);
                    bouncer.style.visibility = 'visible';
                    animate();
                });
            }
        }

        loadSheet();

        // Work popup
        const workBtn = document.getElementById('workBtn');
        const workPopup = document.getElementById('workPopup');
        const workClose = document.getElementById('workClose');

        workBtn.addEventListener('click', () => {
            workPopup.classList.toggle('hidden');
        });

        workClose.addEventListener('click', () => {
            workPopup.classList.add('hidden');
        });
    </script>
</body>
</html>
