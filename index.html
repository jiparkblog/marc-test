<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Marc Hill">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Marc Hill">
    <meta property="og:image" content="Favicon.png">
    <meta property="og:image:alt" content="Marc Hill favicon">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Marc Hill">
    <meta name="twitter:image" content="Favicon.png">
    <link rel="icon" type="image/png" href="Favicon.png">
    <link rel="apple-touch-icon" href="Favicon.png">
    <title>Marc Hill</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Selecta', 'sans-serif'],
                    },
                },
            },
        }
    </script>
<link rel="stylesheet" href="style.css">
</head>
<body class="text-white h-screen overflow-hidden">
    <div class="relative flex flex-col md:grid md:grid-flow-col md:auto-cols-auto p-6 gap-8">
        <div class="flex justify-between items-baseline md:contents">
            <div class="flex flex-col gap-0 leading-tight">
                <span>Marc Hill,</span>
                <span>Design Director</span>
                <span id="music" class="music"></span>
            </div>
            <div class="flex gap-4 md:order-last md:justify-end">
                <span><a href="about.html">About</a></span>
                <span id="workBtn" class="cursor-pointer">Work</span>
            </div>
        </div>
         <div class="flex flex-col gap-0 leading-tight">
            <span><a href="https://www.instagram.com/electronicartsintermix/" target=_blank>Instagram ↗</a></span>
            <span><a href="https://www.instagram.com/electronicartsintermix/" target=_blank>LinkedIn ↗</a></span>
            <span><a href="https://www.instagram.com/electronicartsintermix/" target=_blank>Contact ↗</a></span>
        </div>
         <div class="flex flex-col gap-4">
            <div class="flex flex-col gap-2">
                <span>Now</span>
                <div id="now" class="flex flex-col gap-0 leading-tight"></div>
            </div>
            <div class="flex flex-col gap-2">
                <span>Past</span>
                <div id="past" class="flex flex-col gap-0 leading-tight"></div>
            </div>
        </div>
          <div class="flex flex-col gap-4">
            <div class="flex flex-col gap-2">
                <span>Press</span>
                <div id="press" class="flex flex-col gap-0 leading-tight"></div>
            </div>
        </div>
    </div>

    <button id="refresh" class="fixed bottom-4 right-6 md:bottom-4 md:left-4 md:right-auto text-[30px] cursor-pointer hidden">⟳</button>

    <!-- Work Popup -->
    <div id="workPopup" class="fixed top-0 right-0 w-[310px] bg-white text-black p-8 flex-col gap-2" style="display:none">
        <div class="flex justify-end">
            <span id="workClose" class="cursor-pointer">Close</span>
        </div>
        <div id="workText" class="leading-tight border-b border-[#E3E3E3] pb-[60px]"></div>
         <div class="flex flex-col gap-8">
            <span class="pt-[14px]">Clients</span>
            <div class="marquee-frame">
                <div class="marquee flex gap-8">
                    <img src="logo_1.svg" alt="logo" class="h-4">
                    <img src="logo_2.svg" alt="logo" class="h-4">
                    <img src="logo_3.svg" alt="logo" class="h-4">
                    <img src="logo_4.svg" alt="logo" class="h-4">
                    <img src="logo_5.svg" alt="logo" class="h-4">
                    <img src="logo_6.svg" alt="logo" class="h-4">
                    <img src="logo_7.svg" alt="logo" class="h-4">
                    <img src="logo_8.svg" alt="logo" class="h-4">
                    <img src="logo_1.svg" alt="" aria-hidden="true" class="h-4">
                    <img src="logo_2.svg" alt="" aria-hidden="true" class="h-4">
                    <img src="logo_3.svg" alt="" aria-hidden="true" class="h-4">
                    <img src="logo_4.svg" alt="" aria-hidden="true" class="h-4">
                    <img src="logo_5.svg" alt="" aria-hidden="true" class="h-4">
                    <img src="logo_6.svg" alt="" aria-hidden="true" class="h-4">
                    <img src="logo_7.svg" alt="" aria-hidden="true" class="h-4">
                    <img src="logo_8.svg" alt="" aria-hidden="true" class="h-4">
                </div>
            </div>
        </div>
    </div>

    <!-- Game elements -->
    <!-- Click to start -->
    <div id="gameOver" class="fixed inset-0 flex items-center justify-center pointer-events-none" style="display:none">
        <span class="text-white opacity-50">GAME OVER</span>
    </div>

    <!-- Game elements -->
    <div id="ball" class="fixed pointer-events-none ball-blink" style="width:6px;height:6px;background:#00D4DF;"></div>
    <div id="paddle" class="fixed bottom-[52px] md:bottom-8 pointer-events-none" style="width:80px;height:3px;background:white;opacity:0.5;"></div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQIXomht2WJYoDI6jozjeGsoIROOUdRDZ1drTClymzLfb-S9WUReyObnVMTL9jNNU2xru7qY_vDoDUF/pub?output=csv';

        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const headers = lines[0].split(',').map(h => h.trim());
            const rows = [];
            for (let i = 1; i < lines.length; i++) {
                const values = [];
                let current = '';
                let inQuotes = false;
                for (let char of lines[i]) {
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        values.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                values.push(current.trim());
                const row = {};
                headers.forEach((h, idx) => row[h] = values[idx] || '');
                rows.push(row);
            }
            return { headers, rows };
        }

        function render(rows) {
            // Music
            document.getElementById('music').innerHTML = rows.filter(r => r.Music).map(r =>
                r.Music_URL ? `<a href="${r.Music_URL}" target="_blank" class="text-[#808080] inline-flex items-center gap-1"><span class="cd">💿</span><span>${r.Music}</span></a>` : r.Music
            ).join('<br>');

            // Now
            document.getElementById('now').innerHTML = rows.filter(r => r.Now).map(r => {
                const name = r.Now_Role_Link
                    ? `<a href="${r.Now_Role_Link}" target="_blank">${r.Now}</a>`
                    : r.Now;
                return `<span>${name} <span class="text-[#808080]">${r.Now_Role || ''}</span></span>`;
            }).join('');

            // Past
            document.getElementById('past').innerHTML = rows.filter(r => r.Past).map(r => {
                const name = r.Past_Role_Link
                    ? `<a href="${r.Past_Role_Link}" target="_blank">${r.Past}</a>`
                    : r.Past;
                return `<span>${name} <span class="text-[#808080]">${r.Past_Role || ''}</span></span>`;
            }).join('');

            // Press
            document.getElementById('press').innerHTML = rows.filter(r => r.Press).map(r =>
                r.Press_URL ? `<span><a href="${r.Press_URL}" target="_blank">${r.Press} ↗</a></span>` : `<span>${r.Press}</span>`
            ).join('');

            // Work text
            const workTextRow = rows.find(r => r.Work_text);
            if (workTextRow) {
                document.getElementById('workText').textContent = workTextRow.Work_text;
            }
        }

        async function loadSheet() {
            const CACHE_KEY = 'sheetCache';
            const cached = localStorage.getItem(CACHE_KEY);

            // Render from cache immediately
            if (cached) {
                const { rows } = JSON.parse(cached);
                render(rows);
            }

            // Fetch fresh data
            try {
                const res = await fetch(SHEET_URL);
                const text = await res.text();
                const { rows } = parseCSV(text);
                localStorage.setItem(CACHE_KEY, JSON.stringify({ rows }));
                render(rows);
            } catch (err) {
                console.error('Failed to load sheet:', err);
            }
        }

        loadSheet();

        // Work popup
        const workBtn = document.getElementById('workBtn');
        const workPopup = document.getElementById('workPopup');
        const workClose = document.getElementById('workClose');

        const marquee = document.querySelector('.marquee');

        workBtn.addEventListener('click', () => {
            const isOpen = workPopup.style.display !== 'none';
            workPopup.style.display = isOpen ? 'none' : 'flex';
            marquee.style.animationDuration = isOpen ? '34s' : '24s';
        });

        workClose.addEventListener('click', () => {
            workPopup.style.display = 'none';
            marquee.style.animationDuration = '34s';
        });

        // ========== BREAKOUT GAME ==========
        const ball = document.getElementById('ball');
        const paddle = document.getElementById('paddle');
        const refreshBtn = document.getElementById('refresh');
        const gameOverEl = document.getElementById('gameOver');

        const BALL_COLORS = ['#00D4DF','#BD4BFF','#393DFF','#88FF63','#FFA21F','#FF5A39','#FF7CDE','#FF5275'];
        let ballColorIndex = 0;

        let gameRunning = false;
        let ballX, ballY, ballDX, ballDY;
        let paddleX = window.innerWidth / 2 - 40;
        let targetPaddleX = paddleX;
        const ballSpeed = 4;
        let charElements = [];
        let fallingChars = [];
        let originalHTML = '';

        function getPaddleBottomOffset() {
            return window.matchMedia('(max-width: 767px)').matches ? 52 : 32;
        }

        // Landing state: paddle + ball visible, following mouse
        function updateLandingPosition() {
            const paddleBottomOffset = getPaddleBottomOffset();
            paddle.style.left = paddleX + 'px';
            ball.style.left = (paddleX + 37) + 'px';
            ball.style.top = (window.innerHeight - paddleBottomOffset - 6 - 14) + 'px';
        }

        // Eased landing loop (runs when game is not active)
        let landingLoopId = null;
        function landingLoop() {
            paddleX += (targetPaddleX - paddleX) * 0.1;
            updateLandingPosition();
            if (!gameRunning) landingLoopId = requestAnimationFrame(landingLoop);
        }
        landingLoop();

        // Split text into individual character spans
        function splitTextIntoChars() {
            const content = document.querySelector('body > div');
            originalHTML = content.innerHTML;

            const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT, null, false);
            const textNodes = [];
            while (walker.nextNode()) {
                if (walker.currentNode.textContent.trim()) {
                    textNodes.push(walker.currentNode);
                }
            }

            textNodes.forEach(node => {
                const text = node.textContent;
                const parent = node.parentNode;
                const fragment = document.createDocumentFragment();

                for (let char of text) {
                    const span = document.createElement('span');
                    span.textContent = char;
                    span.className = 'char';
                    fragment.appendChild(span);
                }
                parent.replaceChild(fragment, node);
            });

            charElements = document.querySelectorAll('.char');
        }

        // Make character fall with physics
        function makeCharFall(el) {
            const rect = el.getBoundingClientRect();

            // Clone the element for falling animation
            const clone = el.cloneNode(true);
            clone.style.position = 'fixed';
            clone.style.left = rect.left + 'px';
            clone.style.top = rect.top + 'px';
            clone.style.pointerEvents = 'none';
            clone.style.margin = '0';
            clone.style.display = 'inline-block';
            document.body.appendChild(clone);

            // Hide original but keep in layout
            el.style.visibility = 'hidden';
            el.dataset.falling = 'true';

            const falling = {
                el: clone,
                x: rect.left,
                y: rect.top,
                vx: (Math.random() - 0.5) * 4,
                vy: -2 - Math.random() * 3,
                rotation: 0,
                rotationSpeed: (Math.random() - 0.5) * 15,
                opacity: 1
            };

            fallingChars.push(falling);
        }

        // Update falling characters
        function updateFallingChars() {
            fallingChars = fallingChars.filter(f => {
                f.vy += 0.3; // gravity
                f.x += f.vx;
                f.y += f.vy;
                f.rotation += f.rotationSpeed;

                f.el.style.left = f.x + 'px';
                f.el.style.top = f.y + 'px';
                f.el.style.transform = `rotate(${f.rotation}deg)`;

                if (f.y > window.innerHeight + 50) {
                    f.el.remove();
                    return false;
                }
                return true;
            });
        }

        function startGame() {
            cancelAnimationFrame(landingLoopId);
            gameRunning = true;
            gameOverEl.style.display = 'none';
            ball.classList.remove('ball-blink');
            refreshBtn.classList.remove('hidden');
            fallingChars = [];

            splitTextIntoChars();

            // Launch ball from paddle position
            const paddleBottomOffset = getPaddleBottomOffset();
            ballX = paddleX + 37;
            ballY = window.innerHeight - paddleBottomOffset - 6;
            const angle = Math.random() * Math.PI - Math.PI / 2;
            ballDX = Math.sin(angle) * ballSpeed;
            ballDY = -Math.abs(Math.cos(angle) * ballSpeed);

            ballColorIndex = 0;
            ball.style.background = BALL_COLORS[0];

            gameLoop();
        }

        function stopGame() {
            gameRunning = false;
            refreshBtn.classList.add('hidden');
            gameOverEl.style.display = 'none';
            ball.classList.add('ball-blink');
            landingLoop();

            // Restore original HTML
            const content = document.querySelector('body > div');
            content.innerHTML = originalHTML;

            // Clean up falling chars
            fallingChars.forEach(f => f.el.remove());
            fallingChars = [];

            // Reset ball to sit on paddle
            ballColorIndex = 0;
            ball.style.background = BALL_COLORS[0];
            updateLandingPosition();
        }

        function gameLoop() {
            if (!gameRunning) return;

            // Move ball
            ballX += ballDX;
            ballY += ballDY;

            // Wall collisions
            if (ballX <= 0 || ballX >= window.innerWidth - 20) ballDX = -ballDX;
            if (ballY <= 0) ballDY = -ballDY;

            // Ball out of bounds (bottom)
            if (ballY >= window.innerHeight) {
                ballY = window.innerHeight - 150;
                ballDY = -ballSpeed;
            }

            // Paddle collision
            const paddleRect = paddle.getBoundingClientRect();
            const ballRect = ball.getBoundingClientRect();
            if (
                ballRect.bottom >= paddleRect.top &&
                ballRect.top <= paddleRect.bottom &&
                ballRect.right >= paddleRect.left &&
                ballRect.left <= paddleRect.right &&
                ballDY > 0
            ) {
                ballDY = -ballDY;
                const hitPos = (ballX - paddleX) / paddleRect.width;
                ballDX = ballSpeed * (hitPos - 0.5) * 2;
                ballColorIndex = (ballColorIndex + 1) % BALL_COLORS.length;
                ball.style.background = BALL_COLORS[ballColorIndex];
            }

            // Check collision with character elements
            charElements.forEach(el => {
                if (el.dataset.falling === 'true') return;

                const rect = el.getBoundingClientRect();
                if (rect.width === 0) return;

                if (
                    ballRect.right >= rect.left &&
                    ballRect.left <= rect.right &&
                    ballRect.bottom >= rect.top &&
                    ballRect.top <= rect.bottom
                ) {
                    makeCharFall(el);
                    ballDY = -ballDY;
                    ballColorIndex = (ballColorIndex + 1) % BALL_COLORS.length;
                    ball.style.background = BALL_COLORS[ballColorIndex];
                }
            });

            // Check if all characters have fallen
            if (charElements.length > 0 && [...charElements].every(el => el.dataset.falling === 'true')) {
                gameOverEl.style.display = 'flex';
            }

            // Update falling characters
            updateFallingChars();

            // Ease paddle toward target (desktop)
            paddleX += (targetPaddleX - paddleX) * 0.1;

            // Update positions
            ball.style.left = ballX + 'px';
            ball.style.top = ballY + 'px';
            paddle.style.left = paddleX + 'px';

            requestAnimationFrame(gameLoop);
        }

        // Desktop: set target, easing handled by loops
        document.addEventListener('mousemove', (e) => {
            targetPaddleX = e.clientX - 40;
        });

        // Touch: direct, no easing
        document.addEventListener('touchmove', (e) => {
            paddleX = e.touches[0].clientX - 40;
            targetPaddleX = paddleX;
            if (!gameRunning) updateLandingPosition();
        });

        // Click anywhere to start game (landing state)
        document.addEventListener('click', (e) => {
            if (!gameRunning && !e.target.closest('a') && !e.target.closest('#workBtn') && !e.target.closest('#workPopup') && !e.target.closest('#refresh')) {
                startGame();
            }
        });

        // Refresh button resets to landing
        refreshBtn.addEventListener('click', () => {
            stopGame();
        });
    </script>
</body>
</html>
